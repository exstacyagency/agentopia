services:
  paperclip:
    image: ${PAPERCLIP_IMAGE}
    container_name: agentopia-paperclip
    ports:
      - "3100:3100"
    env_file:
      - .env
    volumes:
      - ./config/paperclip:/app/config/paperclip
      - ./config/hermes:/app/config/hermes
    healthcheck:
      test: ["CMD-SHELL", "python3 /app/config/paperclip/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - runtime

  hermes:
    image: ${HERMES_IMAGE}
    container_name: agentopia-hermes
    env_file:
      - .env
    volumes:
      - ./config/hermes:/app/config/hermes
      - ./config/paperclip:/app/config/paperclip
    depends_on:
      paperclip:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 /app/config/hermes/healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    profiles:
      - runtime
